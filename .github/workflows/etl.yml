name: GovInsight ETL

on:
  schedule:
    # 毎月1日 JST 06:00 (= UTC 21:00 前月末日)
    - cron: "0 21 28-31 * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "JSON出力をスキップ（テスト用）"
        required: false
        default: "false"

jobs:
  etl:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: etl/requirements.txt

      - name: Install dependencies
        run: |
          pip install -r etl/requirements.txt

      - name: Run ETL
        run: |
          cd etl
          DRY_RUN_FLAG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          python main.py \
            --data-dir /tmp/govinsight-data \
            --output-dir ../public/data \
            $DRY_RUN_FLAG

      - name: Commit updated data
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "govinsight-bot"
          git config user.email "bot@govinsight.jp"
          git add public/data/
          if git diff --staged --quiet; then
            echo "データに変更なし。スキップ。"
          else
            git commit -m "data: ETL 自動更新 $(date '+%Y-%m-%d')"
            git push
          fi
